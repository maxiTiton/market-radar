name: Market Data Scraper

on:
  schedule:
    - cron: '0 21 * * 1-5'  # 18hs Argentina (UTC-3) = 21hs UTC, lunes a viernes
  workflow_dispatch:          # permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests python-dotenv

      - name: Run scraper
        run: python src/main.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/
          git diff --staged --quiet || git commit -m "chore: update market data [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push